[mypy]
python_version = 3.10

# --- Lenient starter config (Phase 0) ---
# Goal: catch obvious type errors without blocking progress.
# TODO(Phase 1): gradually set these to true as stubs are added.
ignore_missing_imports = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
warn_return_any = False
warn_unused_ignores = True
warn_redundant_casts = True
no_implicit_optional = True
strict_equality = True

# Exclude auto-generated, legacy, or non-production files
exclude = outputs/|tests/|demo_runner\.py|test_rice_seeds\.py|web_demo\.py
