# ruff configuration for ACE Agent
# Target Python 3.10+; rules tuned for a data-science / agent codebase.

[tool.ruff]
target-version = "py310"
line-length = 120
exclude = [
    ".git",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
    "outputs",
    "*.tex",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line-length — handled by formatter
    "B008",   # do not perform function calls in default arguments (common in FastAPI/Streamlit)
    "B904",   # raise from — too strict for current codebase
    "SIM108", # ternary operator — personal taste
    "UP007",  # X | Y union syntax — keep Optional for clarity
    "E741",   # ambiguous variable names (l, O, I) — numpy code uses these
]

[tool.ruff.lint.per-file-ignores]
# Test files need sys.path manipulation before ACE_Agent imports
"tests/*.py" = ["E402", "I001"]
# Sandbox has intentional local imports inside try blocks
"tools/coder_sandbox.py" = ["I001"]

[tool.ruff.lint.isort]
known-first-party = ["ACE_Agent"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "outputs/*",
    "web_demo.py",
    "demo_runner.py",
    "test_rice_seeds.py",
    "*.tex",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "@abstractmethod",
]
